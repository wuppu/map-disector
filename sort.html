<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V2X Map Editor</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(15, 23, 42, 0.98);
            --border: rgba(255, 255, 255, 0.15);
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --font: 'Pretendard', sans-serif;
        }

        body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); font-family: var(--font); color: var(--text-main); }
        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; cursor: crosshair; background: #111; }

        .sidebar {
            position: absolute; top: 0; left: 0; width: 500px; height: 100%;
            background: var(--bg-panel); border-right: 1px solid var(--border);
            z-index: 2000; display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.collapsed { transform: translateX(-100%); }

        .header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); }
        .title { font-weight: 800; font-size: 16px; letter-spacing: -0.5px; }
        .toggle-btn { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 20px; }

        .content { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }

        textarea {
            width: 100%; height: 100px; background: rgba(0,0,0,0.3); color: #a5f3fc;
            border: 1px solid var(--border); border-radius: 6px; padding: 10px;
            font-family: monospace; font-size: 11px; resize: vertical; white-space: pre; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--primary); outline: none; background: rgba(0,0,0,0.5); }

        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.2s; color: white; }
        .btn-blue { background: var(--primary); } .btn-green { background: var(--success); } .btn-gray { background: #334155; border: 1px solid var(--border); }
        .btn:hover { filter: brightness(1.1); }
        .btn-sm { padding: 4px 8px; font-size: 11px; width: auto; flex: none; }

        .lane-card { background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 8px; margin-bottom: 8px; transition: 0.2s; overflow: hidden; }
        .lane-card:hover { border-color: var(--border); }
        .lane-card.active { border-color: var(--warning); background: rgba(245, 158, 11, 0.05); }
        .lane-card.editing { border-color: var(--warning); }

        .card-header { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; background: rgba(0,0,0,0.2); }
        .card-title { font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 8px; }

        .edit-form { padding: 12px; display: none; border-top: 1px solid var(--border); }
        .lane-card.editing .edit-form { display: block; }

        .section-title { font-size: 11px; font-weight: 800; color: var(--text-sub); margin: 12px 0 6px 0; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        .form-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .form-label { font-size: 11px; color: var(--text-sub); }
        .form-input { background: #0f172a; border: 1px solid var(--border); color: white; padding: 6px; border-radius: 4px; font-size: 11px; width: 100%; box-sizing: border-box; }
        .form-input:focus { border-color: var(--primary); outline: none; }

        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #cbd5e1; cursor: pointer; }
        .checkbox-item input { accent-color: var(--primary); }

        .conn-list { display: flex; flex-direction: column; gap: 6px; }
        .conn-item { display: flex; gap: 6px; align-items: center; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; border: 1px solid var(--border); }

        .badge { padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .bg-in { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .bg-out { background: rgba(239, 68, 68, 0.2); color: #f87171; }
        .icon-btn { padding: 4px; background: none; border: none; color: var(--text-sub); cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .icon-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        .icon-btn.del:hover { color: var(--danger); background: rgba(239, 68, 68, 0.15); }

        #drawBanner { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-size: 13px; display: none; z-index: 3000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none; }

        .floating-menu-btn { position: absolute; top: 20px; left: 20px; z-index: 1500; width: 44px; height: 44px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: white; font-size: 20px; }

        .node-handle { background: white; border: 2px solid black; border-radius: 50%; cursor: grab; }
        .node-handle:hover { transform: scale(1.3); border-color: var(--primary); }

        .move-mode-active { border: 2px solid var(--warning); padding: 4px; border-radius: 4px; background: rgba(245, 158, 11, 0.1); }
        .move-mode-label { color: var(--warning); font-weight: bold; font-size: 11px; margin-left: 5px; }

        #laneList::-webkit-scrollbar { width: 6px; }
        #laneList::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        #laneList::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body>

<div id="drawBanner">DRAWING: Click map to add points. Right-click to Finish.</div>
<button class="floating-menu-btn" onclick="openSidebar()" title="Open Menu">☰</button>

<div id="sidebar" class="sidebar">
    <div class="header">
        <span class="title">V2X Map Editor</span>
        <button class="toggle-btn" onclick="closeSidebar()">×</button>
    </div>

    <div class="content">
        <div class="btn-group">
            <button class="btn btn-blue" onclick="startDrawing()">+ Draw Lane</button>
            <button class="btn btn-green" onclick="handleSaveAndRefresh()">Save JSON</button>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
            <div style="font-size:11px; font-weight:700; color:#94a3b8; margin-bottom:10px; display:flex; justify-content:space-between;">
                <span>LANE CONFIGURATION</span>
                <span id="laneCount">0 Lanes</span>
            </div>
            <div id="laneList" style="overflow-y:auto; flex:1;"></div>
        </div>

        <div style="margin-top:auto;">
            <div style="font-size:11px; font-weight:700; color:#94a3b8; margin-bottom:5px;">RAW JSON</div>
            <textarea id="jsonInput" spellcheck="false" placeholder="Paste JSON here..."></textarea>
            <button class="btn btn-gray" style="width:100%; margin-top:5px;" onclick="parseAndRender()">Render</button>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
    // Core Logic & Constants
    const map = L.map('map', { zoomControl: false }).setView([36.5, 127.5], 18);
    L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 22, maxNativeZoom: 19, attribution: 'Google' }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const groups = { casing: L.layerGroup().addTo(map), lanes: L.layerGroup().addTo(map), nodes: L.layerGroup().addTo(map), temp: L.layerGroup().addTo(map) };

    const MANEUVERS = [
        "maneuverStraightAllowed", "maneuverLeftAllowed", "maneuverRightAllowed", "maneuverUTurnAllowed",
        "maneuverLeftTurnOnRedAllowed", "maneuverRightTurnOnRedAllowed", "maneuverLaneChangeAllowed",
        "maneuverNoStoppingAllowed", "yieldAllwaysRequired", "goWithHalt", "caution", "reserved1"
    ];

    const CONN_OPTIONS = [
        { label: "Straight (8000)", value: "8000" },
        { label: "Left Turn (4000)", value: "4000" },
        { label: "Right Turn (2000)", value: "2000" },
        { label: "U-Turn (1000)", value: "1000" },
        { label: "Left on Red (0800)", value: "0800" },
        { label: "Right on Red (0400)", value: "0400" },
        { label: "Lane Change (0200)", value: "0200" },
        { label: "No Stopping (0100)", value: "0100" },
        { label: "Yield (0080)", value: "0080" },
        { label: "Go with Halt (0040)", value: "0040" },
        { label: "Caution (0020)", value: "0020" },
        { label: "Reserved (0010)", value: "0010" }
    ];

    let state = {
        originalJson: null,
        refPoint: { lat: 36.5, lng: 127.5 },
        uiLanes: [],
        isDrawing: false,
        tempPoints: [],
        tempLine: null,
        editingId: null,
        movingLaneIds: []
    };

    function openSidebar() { document.getElementById('sidebar').classList.remove('collapsed'); setTimeout(() => map.invalidateSize(), 350); }
    function closeSidebar() { document.getElementById('sidebar').classList.add('collapsed'); setTimeout(() => map.invalidateSize(), 350); }

    // Logic: Auto Sort
    function sortLanes() {
        state.uiLanes.sort((a, b) => a.id - b.id);
    }

    // Parser
    function parseAndRender() {
        const text = document.getElementById('jsonInput').value.trim();
        if (!text) return;

        try {
            state.originalJson = JSON.parse(text);
            let mapData = state.originalJson;
            if (mapData.value && mapData.value.intersections) mapData = mapData.value;

            if (!mapData.intersections || mapData.intersections.length === 0) throw new Error("No intersections found");

            const intersection = mapData.intersections[0];
            if (!intersection.refPoint) throw new Error("No refPoint found");

            state.refPoint = {
                lat: intersection.refPoint.lat / 10000000,
                lng: intersection.refPoint.long / 10000000
            };
            map.setView([state.refPoint.lat, state.refPoint.lng], 18);

            state.uiLanes = [];

            if (intersection.laneSet) {
                intersection.laneSet.forEach(l => {
                    const points = calculatePoints(l.nodeList.nodes, state.refPoint);
                    const dirHex = parseInt(l.laneAttributes.directionalUse || "00", 16);
                    const isIngress = (dirHex & 0x80) !== 0;
                    const approachID = isIngress ? (l.ingressApproach || 0) : (l.egressApproach || 0);

                    let lType = 'vehicle';
                    let lTypeAttr = '';
                    if(l.laneAttributes.laneType) {
                        lType = Object.keys(l.laneAttributes.laneType)[0];
                        lTypeAttr = JSON.stringify(l.laneAttributes.laneType[lType]);
                    }

                    const manBits = hexToBitArray(l.maneuvers, 12);
                    const connections = (l.connectsTo || []).map(c => ({
                        lane: c.connectingLane.lane,
                        signal: c.signalGroup || 0,
                        maneuver: c.connectingLane.maneuver
                    }));

                    state.uiLanes.push({
                        id: l.laneID,
                        name: l.name || "",
                        points: points,
                        isIngress: isIngress,
                        approachID: approachID,
                        type: lType,
                        typeAttr: lTypeAttr,
                        sharedWith: l.laneAttributes.sharedWith || "0000",
                        maneuvers: manBits,
                        connections: connections,
                        _casing: null, _core: null, _markers: []
                    });
                });
            }
            sortLanes();
            updateJson(); // Force standard formatting on load
            refreshVisuals();
            renderSidebar();

        } catch (e) {
            console.error(e);
            alert("JSON Parsing Error:\n" + e.message);
        }
    }

    function calculatePoints(nodes, ref) {
        if (!nodes) return [];
        let curLat = ref.lat, curLng = ref.lng;
        const pts = [];
        nodes.forEach(n => {
            if (n.delta['node-LatLon']) {
                const d = n.delta['node-LatLon'];
                curLat = d.lat / 10000000;
                curLng = d.lon / 10000000;
                pts.push({ lat: curLat, lng: curLng });
            } else {
                const key = Object.keys(n.delta).find(k => k.startsWith('node-XY'));
                if (key) {
                    const d = n.delta[key];
                    curLat += (d.y / 100) / 111320;
                    curLng += (d.x / 100) / (111320 * Math.cos(ref.lat * Math.PI / 180));
                    pts.push({ lat: curLat, lng: curLng });
                }
            }
        });
        return pts;
    }

    // UI Rendering
    function renderSidebar() {
        const container = document.getElementById('laneList');
        const scrollPos = container.scrollTop;
        container.innerHTML = '';
        document.getElementById('laneCount').innerText = `${state.uiLanes.length} Lanes`;

        state.uiLanes.forEach(lane => {
            const el = document.createElement('div');
            const isEditing = (state.editingId === lane.id);
            const isMoving = state.movingLaneIds.includes(lane.id);

            el.className = `lane-card ${isEditing ? 'editing active' : ''}`;
            el.id = `card-${lane.id}`;

            el.innerHTML = `
                <div class="card-header" onclick="selectLane(${lane.id})">
                    <span class="card-title">
                        Lane ${lane.id}
                        <span class="badge ${lane.isIngress ? 'bg-in' : 'bg-out'}">${lane.isIngress ? 'IN' : 'OUT'}</span>
                    </span>
                    <div>
                        <button class="icon-btn" title="Edit">✎</button>
                        <button class="icon-btn del" title="Delete" onclick="deleteLane(${lane.id}, event)">✕</button>
                    </div>
                </div>
                <div class="edit-form" onclick="event.stopPropagation()">

                    <div style="margin-bottom:12px;" class="${isMoving ? 'move-mode-active' : ''}">
                        <label class="checkbox-item">
                            <input type="checkbox" ${isMoving ? 'checked' : ''} onchange="toggleMoveMode(${lane.id}, this.checked)">
                            <span style="color:white; font-weight:700;">Move Whole Lane</span>
                            ${isMoving ? '<span class="move-mode-label">DRAG ANY NODE</span>' : ''}
                        </label>
                    </div>

                    <div class="section-title">Identity</div>
                    <div class="form-row">
                        <div class="form-col">
                            <span class="form-label">Lane ID</span>
                            <input type="number" class="form-input" value="${lane.id}" onchange="updateLaneId(${lane.id}, this.value)">
                        </div>
                        <div class="form-col">
                            <span class="form-label">Name</span>
                            <input type="text" class="form-input" value="${lane.name}" onchange="updateProp(${lane.id}, 'name', this.value)">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <span class="form-label">SharedWith</span>
                            <input type="text" class="form-input" value="${lane.sharedWith}" onchange="updateProp(${lane.id}, 'sharedWith', this.value)">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col" style="flex:1">
                            <span class="form-label">Lane Type</span>
                            <select class="form-input" onchange="updateProp(${lane.id}, 'type', this.value)">
                                <option value="vehicle" ${lane.type==='vehicle'?'selected':''}>Vehicle</option>
                                <option value="crosswalk" ${lane.type==='crosswalk'?'selected':''}>Crosswalk</option>
                                <option value="bikeLane" ${lane.type==='bikeLane'?'selected':''}>Bike</option>
                                <option value="sidewalk" ${lane.type==='sidewalk'?'selected':''}>Sidewalk</option>
                            </select>
                        </div>
                        <div class="form-col" style="flex:2">
                            <span class="form-label">Type Attr (JSON)</span>
                            <input type="text" class="form-input" value='${lane.typeAttr || "{}"}' onchange="updateProp(${lane.id}, 'typeAttr', this.value)">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-col">
                            <span class="form-label">Direction</span>
                            <select class="form-input" onchange="updateProp(${lane.id}, 'isIngress', this.value === 'true')">
                                <option value="true" ${lane.isIngress?'selected':''}>Ingress (80)</option>
                                <option value="false" ${!lane.isIngress?'selected':''}>Egress (40)</option>
                            </select>
                        </div>
                        <div class="form-col">
                            <span class="form-label">Appr. ID</span>
                            <input type="number" class="form-input" value="${lane.approachID}" onchange="updateProp(${lane.id}, 'approachID', parseInt(this.value))">
                        </div>
                    </div>

                    <div class="section-title">Maneuvers</div>
                    <div class="checkbox-grid">
                        ${MANEUVERS.map((m, idx) => `
                            <label class="checkbox-item">
                                <input type="checkbox" ${lane.maneuvers[idx] ? 'checked' : ''} onchange="updateManeuver(${lane.id}, ${idx}, this.checked)">
                                ${m.replace('maneuver','').replace('Allowed','')}
                            </label>
                        `).join('')}
                    </div>

                    <div class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
                        Connections
                        <button class="btn btn-blue btn-sm" onclick="addConnection(${lane.id})">+ Add</button>
                    </div>
                    <div class="conn-list">
                        ${lane.connections.map((conn, cIdx) => `
                            <div class="conn-item">
                                <div class="form-col" style="width:50px;">
                                    <span class="form-label">To</span>
                                    <input type="number" class="form-input" value="${conn.lane}" onchange="updateConnection(${lane.id}, ${cIdx}, 'lane', parseInt(this.value))">
                                </div>
                                <div class="form-col" style="width:50px;">
                                    <span class="form-label">Signal</span>
                                    <input type="number" class="form-input" value="${conn.signal}" onchange="updateConnection(${lane.id}, ${cIdx}, 'signal', parseInt(this.value))">
                                </div>
                                <div class="form-col" style="flex:1;">
                                    <span class="form-label">Maneuver</span>
                                    <select class="form-input" onchange="updateConnection(${lane.id}, ${cIdx}, 'maneuver', this.value)">
                                        ${CONN_OPTIONS.map(opt => `
                                            <option value="${opt.value}" ${conn.maneuver === opt.value ? 'selected' : ''}>
                                                ${opt.label}
                                            </option>
                                        `).join('')}
                                    </select>
                                </div>
                                <button class="icon-btn del" onclick="removeConnection(${lane.id}, ${cIdx})">✕</button>
                            </div>
                        `).join('')}
                        ${lane.connections.length === 0 ? '<span style="color:#666; font-size:11px;">No connections</span>' : ''}
                    </div>

                </div>
            `;
            el.addEventListener('click', (e) => {
                if (!e.target.closest('.edit-form') && !e.target.closest('.card-header')) {
                    selectLane(lane.id);
                }
            });
            container.appendChild(el);
        });
        container.scrollTop = scrollPos;
    }

    // Update Logic
    function handleSaveAndRefresh() {
        updateJson();
        refreshVisuals();
        renderSidebar();
    }

    function selectLane(id) {
        state.editingId = (state.editingId === id) ? null : id;
        const lane = state.uiLanes.find(l => l.id === id);
        if (lane && state.editingId === id) {
            openSidebar();
            map.fitBounds(L.polyline(lane.points).getBounds(), { padding: [50, 50], maxZoom: 20 });
        }
        refreshVisuals();
        renderSidebar();
    }

    function toggleEdit(id) { selectLane(id); }

    function toggleMoveMode(id, checked) {
        if(checked) {
            if(!state.movingLaneIds.includes(id)) state.movingLaneIds.push(id);
        } else {
            state.movingLaneIds = state.movingLaneIds.filter(x => x !== id);
        }
        renderSidebar();
    }

    function updateLaneId(oldId, newIdStr) {
        const newId = parseInt(newIdStr);
        if (state.uiLanes.find(l => l.id === newId)) {
            alert("ID " + newId + " is already used by another lane.");
            renderSidebar();
            return;
        }
        const lane = state.uiLanes.find(l => l.id === oldId);
        if (lane) {
            lane.id = newId;
            if (state.editingId === oldId) state.editingId = newId;
            sortLanes();
            updateJson();
            refreshVisuals();
            renderSidebar();
        }
    }

    function updateProp(id, key, val) {
        const lane = state.uiLanes.find(l => l.id === id);
        if (lane) { lane[key] = val; updateJson(); refreshVisuals(); renderSidebar(); }
    }

    function updateManeuver(id, idx, checked) {
        const lane = state.uiLanes.find(l => l.id === id);
        if(lane) { lane.maneuvers[idx] = checked; updateJson(); }
    }

    function addConnection(id) {
        const lane = state.uiLanes.find(l => l.id === id);
        if(lane) {
            lane.connections.push({ lane: 0, signal: 0, maneuver: '8000' });
            updateJson(); renderSidebar();
        }
    }

    function removeConnection(id, idx) {
        const lane = state.uiLanes.find(l => l.id === id);
        if(lane) { lane.connections.splice(idx, 1); updateJson(); renderSidebar(); }
    }

    function updateConnection(id, idx, key, val) {
        const lane = state.uiLanes.find(l => l.id === id);
        if(lane && lane.connections[idx]) { lane.connections[idx][key] = val; updateJson(); }
    }

    function deleteLane(id, e) {
        e.stopPropagation();
        if(confirm("Delete this lane?")) {
            state.uiLanes = state.uiLanes.filter(l => l.id !== id);
            if(state.editingId === id) state.editingId = null;
            updateJson(); refreshVisuals(); renderSidebar();
        }
    }

    function updateJson() {
        if (!state.originalJson) return;
        let root = state.originalJson;
        let mapData = root.value && root.value.intersections ? root.value : root;
        const intersection = mapData.intersections[0];

        intersection.laneSet = intersection.laneSet.filter(jl => state.uiLanes.some(ul => ul.id === jl.laneID));

        sortLanes();

        state.uiLanes.forEach(ui => {
            // Requirement: Sort nodes by distance to refPoint (closest first)
            ui.points.sort((a, b) => {
                const distA = Math.pow(a.lat - state.refPoint.lat, 2) + Math.pow(a.lng - state.refPoint.lng, 2);
                const distB = Math.pow(b.lat - state.refPoint.lat, 2) + Math.pow(b.lng - state.refPoint.lng, 2);
                return distA - distB;
            });

            let jsonIndex = intersection.laneSet.findIndex(jl => jl.laneID === ui.id);
            const orderedLane = {};

            orderedLane.laneID = ui.id;
            if(ui.name) orderedLane.name = ui.name;
            if (ui.isIngress) orderedLane.ingressApproach = ui.approachID;
            else orderedLane.egressApproach = ui.approachID;

            let attrVal = {};
            try { attrVal = JSON.parse(ui.typeAttr); } catch(e) { attrVal = ui.typeAttr; }
            const lTypeObj = {};
            lTypeObj[ui.type] = attrVal;

            orderedLane.laneAttributes = {
                directionalUse: ui.isIngress ? '80' : '40',
                sharedWith: ui.sharedWith,
                laneType: lTypeObj
            };

            orderedLane.maneuvers = bitArrayToHex(ui.maneuvers);

            const nodeList = [];
            let prevLat = state.refPoint.lat, prevLng = state.refPoint.lng;

            ui.points.forEach((pt, idx) => {
                const dLat = pt.lat - prevLat, dLng = pt.lng - prevLng;
                const y_cm = Math.round(dLat * 11132000);
                const x_cm = Math.round(dLng * (11132000 * Math.cos(state.refPoint.lat * Math.PI / 180)));

                const max = Math.max(Math.abs(x_cm), Math.abs(y_cm));

                // Requirement: Always force node-XY output
                let type = "node-XY6";
                if(max<=511) type="node-XY1";
                else if(max<=1023) type="node-XY2";
                else if(max<=2047) type="node-XY3";
                else if(max<=4095) type="node-XY4";
                else if(max<=8191) type="node-XY5";

                const node = { delta: { [type]: { x: x_cm, y: y_cm } } };
                if (ui.isIngress && idx === 0) {
                    node.attributes = { localNode: ["stopLine"] };
                }
                nodeList.push(node);
                prevLat = pt.lat; prevLng = pt.lng;
            });
            orderedLane.nodeList = { nodes: nodeList };

            const connectsTo = ui.connections.map(c => ({
                connectingLane: { lane: c.lane, maneuver: c.maneuver || "0000" },
                signalGroup: c.signal
            }));

            if (connectsTo.length > 0) orderedLane.connectsTo = connectsTo;

            if (jsonIndex >= 0) intersection.laneSet[jsonIndex] = orderedLane;
            else intersection.laneSet.push(orderedLane);
        });

        intersection.laneSet.sort((a,b) => a.laneID - b.laneID);

        document.getElementById('jsonInput').value = JSON.stringify(state.originalJson, null, 2);
    }

    // Visuals & Drag
    function hexToBitArray(hex, length) {
        if(!hex) return new Array(length).fill(false);
        const binStr = parseInt(hex, 16).toString(2).padStart(hex.length * 4, '0');
        const bits = [];
        for(let i=0; i<length; i++) bits.push(binStr[i] === '1');
        return bits;
    }

    function bitArrayToHex(bits) {
        const str = bits.map(b => b ? '1' : '0').join('');
        const targetLen = 16;
        const padded = str.padEnd(targetLen, '0');
        let hex = "";
        for (let i = 0; i < padded.length; i += 4) {
            hex += parseInt(padded.substr(i, 4), 2).toString(16).toUpperCase();
        }
        return hex;
    }

    function refreshVisuals() {
        groups.casing.clearLayers(); groups.lanes.clearLayers(); groups.nodes.clearLayers();
        if(state.refPoint) {
            L.circleMarker([state.refPoint.lat, state.refPoint.lng], { radius: 8, color: '#fff', fillColor: '#fbbf24', fillOpacity: 1 }).addTo(groups.lanes).bindTooltip("REF");
        }

        state.uiLanes.forEach(lane => {
            const isSelected = (lane.id === state.editingId);
            const casingColor = isSelected ? '#fbbf24' : '#000';
            const casingWeight = isSelected ? 14 : 8;
            const casingOpacity = isSelected ? 0.8 : 0.6;
            const color = lane.isIngress ? '#3b82f6' : '#ef4444';

            const casing = L.polyline(lane.points, { color: casingColor, weight: casingWeight, opacity: casingOpacity }).addTo(groups.casing);
            const core = L.polyline(lane.points, { color: color, weight: 4 }).addTo(groups.lanes);

            if (isSelected) {
                casing.bringToFront();
                core.bringToFront();
            }

            lane._casing = casing;
            lane._core = core;
            lane._markers = [];

            [casing, core].forEach(l => {
                l.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    selectLane(lane.id);
                    setTimeout(() => {
                        const card = document.getElementById(`card-${lane.id}`);
                        if(card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                });
            });

            lane.points.forEach((pt, idx) => {
                const mk = L.marker(pt, { icon: L.divIcon({ className: 'node-handle', iconSize: [10, 10] }), draggable: true }).addTo(groups.nodes);
                lane._markers.push(mk);
                if (isSelected) mk.setZIndexOffset(1000);

                let startDragPos = null;

                mk.on('dragstart', (e) => {
                    startDragPos = e.target.getLatLng();
                });

                mk.on('drag', e => {
                    const newPos = e.target.getLatLng();

                    if (state.movingLaneIds.includes(lane.id)) {
                        const latDiff = newPos.lat - startDragPos.lat;
                        const lngDiff = newPos.lng - startDragPos.lng;

                        lane.points.forEach((p, i) => {
                            p.lat += latDiff;
                            p.lng += lngDiff;
                            if (i !== idx) {
                                lane._markers[i].setLatLng(p);
                            }
                        });
                        startDragPos = newPos;
                    } else {
                        lane.points[idx] = newPos;
                    }

                    lane._casing.setLatLngs(lane.points);
                    lane._core.setLatLngs(lane.points);
                });

                mk.on('dragend', () => {
                    updateJson();
                    // To automatically snap the visual line if sorting changed the order
                    refreshVisuals();
                });
            });
        });
    }

    function startDrawing() {
        if (state.isDrawing) return;
        state.isDrawing = true; state.tempPoints = [];
        document.getElementById('drawBanner').style.display = 'block';
        closeSidebar();
        document.getElementById('map').style.cursor = 'crosshair';
        map.on('contextmenu', finishDrawing);
    }

    function finishDrawing(e) {
        if (state.isDrawing) {
            L.DomEvent.stopPropagation(e); L.DomEvent.preventDefault(e);
            state.isDrawing = false;
            document.getElementById('drawBanner').style.display = 'none';
            openSidebar();
            document.getElementById('map').style.cursor = '';
            groups.temp.clearLayers();
            map.off('contextmenu', finishDrawing);

            if (state.tempPoints.length > 0) {
                const maxId = state.uiLanes.reduce((m, l) => Math.max(m, l.id || 0), 0);
                const newId = maxId + 1;
                state.uiLanes.push({
                    id: newId,
                    name: "New Lane",
                    points: [...state.tempPoints],
                    isIngress: true,
                    approachID: 1,
                    type: 'vehicle',
                    typeAttr: '{"value":"", "length":0}',
                    sharedWith: '0000',
                    maneuvers: new Array(12).fill(false),
                    connections: [],
                    _casing: null, _core: null, _markers: []
                });

                sortLanes();
                updateJson();
                refreshVisuals();
                selectLane(newId);
            }
            state.tempPoints = [];
        }
    }

    map.on('click', e => {
        if (!state.isDrawing) return;
        state.tempPoints.push(e.latlng);
        L.circleMarker(e.latlng, { radius: 4, color: '#10b981', fillOpacity: 1 }).addTo(groups.temp);
        if(state.tempPoints.length > 1) L.polyline(state.tempPoints, { color: '#10b981', dashArray: '5,5' }).addTo(groups.temp);
    });

    setTimeout(() => { map.invalidateSize(); parseAndRender(); }, 500);

</script>
